<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>aethoflo — Milestone Moment</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{width:100%;height:100%;overflow:hidden;background:#0a0a0a}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel">
/* ============================================================
   aethoflo · Milestone Moment Animation
   Flow: SMS → Card → Module → Checklist → Arc pan-out
   Duration: 26s, loops
   ============================================================ */

const { useState, useEffect, useRef, useMemo } = React;

// ── palette ──────────────────────────────────────────────────
const C = {
  cream: '#FAF5EF',
  creams: '#F4ECE1',
  ink: '#2A1810',
  inkFade: 'rgba(42,24,16,0.55)',
  orange: '#E87A4E',
  orangeDeep: '#D4633A',
  orangeGlow: '#F4A374',
  green: '#5DB87A',
  bg: '#1A100B',
  card: '#FFFFFF',
  sms: '#E87A4E',
  rule: 'rgba(42,24,16,0.1)',
};

// ── helpers ───────────────────────────────────────────────────
const lerp = (a, b, t) => a + (b - a) * t;
const ease = (t) => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
const easeOut = (t) => 1 - Math.pow(1 - t, 3);
const easeBack = (t) => { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); };

function fadeIn(t, start, dur) {
  if (t < start) return 0;
  return Math.min(1, (t - start) / dur);
}
function fadeOut(t, start, dur) {
  if (t < start) return 1;
  if (t > start + dur) return 0;
  return 1 - (t - start) / dur;
}
function slideY(t, start, dur, from=24, eas=easeOut) {
  if (t < start) return from;
  const p = Math.min(1, (t - start) / dur);
  return lerp(from, 0, eas(p));
}

// ── Logo glyph (B3) ──────────────────────────────────────────
function LogoGlyph({ size=28 }) {
  const id = 'anim-clip';
  return (
    <svg width={size} height={size*100/120} viewBox="0 0 120 100" style={{display:'block',flexShrink:0}}>
      <circle cx="74" cy="46" r="32" fill={C.orange}/>
      <circle cx="42" cy="60" r="20" fill={C.ink}/>
      <clipPath id={id}><circle cx="42" cy="60" r="20"/></clipPath>
      <g clipPath={`url(#${id})`}><circle cx="74" cy="46" r="32" fill={C.cream}/></g>
    </svg>
  );
}

// ── Phone frame ───────────────────────────────────────────────
function Phone({ x, y, scale=1, opacity=1, children }) {
  const w=320, h=620, r=40;
  return (
    <div style={{
      position:'absolute', left:x, top:y,
      width:w, height:h,
      transform:`scale(${scale})`,
      transformOrigin:'top center',
      opacity,
      transition:'opacity 0.4s',
    }}>
      {/* Phone shell */}
      <svg width={w} height={h} style={{position:'absolute',top:0,left:0}} viewBox={`0 0 ${w} ${h}`}>
        <rect x="1" y="1" width={w-2} height={h-2} rx={r} fill="#1A1A1A" stroke="#333" strokeWidth="2"/>
        <rect x="8" y="8" width={w-16} height={h-16} rx={r-6} fill="#0D0D0D"/>
        {/* Side buttons */}
        <rect x="-2" y="140" width="4" height="40" rx="2" fill="#2a2a2a"/>
        <rect x="-2" y="190" width="4" height="60" rx="2" fill="#2a2a2a"/>
        <rect x={w-2} y="160" width="4" height="70" rx="2" fill="#2a2a2a"/>
        {/* Camera notch */}
        <rect x={w/2-55} y="12" width="110" height="28" rx="14" fill="#1A1A1A"/>
        <circle cx={w/2+18} cy="26" r="5" fill="#111"/>
        <circle cx={w/2+18} cy="26" r="2.5" fill="#1A2A1A"/>
        <ellipse cx={w/2-10} cy="26" rx="14" ry="6" fill="#111"/>
      </svg>

      {/* Screen area */}
      <div style={{
        position:'absolute',
        top:44, left:10,
        width:w-20, height:h-88,
        borderRadius:r-10,
        overflow:'hidden',
        background: C.cream,
      }}>
        {children}
      </div>
    </div>
  );
}

// ── SMS Notification ─────────────────────────────────────────
function SMSBubble({ opacity, ty }) {
  return (
    <div style={{
      position:'absolute', top:60+ty, left:16, right:16,
      opacity,
      background:'white',
      borderRadius:16,
      padding:'12px 14px',
      boxShadow:'0 8px 24px rgba(0,0,0,0.12)',
      display:'flex', gap:10, alignItems:'flex-start',
    }}>
      <div style={{
        width:36,height:36,borderRadius:10,
        background:C.orange,
        display:'flex',alignItems:'center',justifyContent:'center',
        flexShrink:0,
      }}>
        <LogoGlyph size={22}/>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{
          fontFamily:'Inter,sans-serif',fontSize:12,fontWeight:600,
          color:'#333',marginBottom:2,display:'flex',justifyContent:'space-between',
        }}>
          <span>aethoflo</span>
          <span style={{color:'#999',fontWeight:400}}>now</span>
        </div>
        <div style={{fontFamily:'Inter,sans-serif',fontSize:13,color:'#555',lineHeight:1.35}}>
          Week 1 check-in · You've got a new module waiting. Tap to see it.
        </div>
      </div>
    </div>
  );
}

// ── Status bar ────────────────────────────────────────────────
function StatusBar() {
  return (
    <div style={{
      position:'absolute',top:0,left:0,right:0,height:44,
      display:'flex',alignItems:'center',justifyContent:'space-between',
      padding:'0 18px',
      fontFamily:'Inter,sans-serif',fontSize:13,fontWeight:600,
      color:C.ink,
    }}>
      <span>9:41</span>
      <div style={{display:'flex',gap:5,alignItems:'center'}}>
        <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="6" width="3" height="6" rx="1" fill={C.ink}/><rect x="4.5" y="4" width="3" height="8" rx="1" fill={C.ink}/><rect x="9" y="2" width="3" height="10" rx="1" fill={C.ink}/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill={C.ink} opacity="0.3"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2C10.5 2 12.8 3 14.4 4.7L16 3C13.9 1.1 11.1 0 8 0S2.1 1.1 0 3l1.6 1.7C3.2 3 5.5 2 8 2zm0 4C9.4 6 10.6 6.6 11.5 7.6L13.1 6C11.8 4.7 10 4 8 4S4.2 4.7 2.9 6L4.5 7.6C5.4 6.6 6.6 6 8 6zm0 4c-.8 0-1.5-.3-2-.8L4.4 9.8C5.3 10.8 6.6 11.4 8 11.4s2.7-.6 3.6-1.6L10 8.2c-.5.5-1.2.8-2 .8z" fill={C.ink}/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2" stroke={C.ink} strokeWidth="1.2" fill="none"/><rect x="23" y="3.5" width="2" height="5" rx="1" fill={C.ink} opacity="0.5"/><rect x="1" y="2" width="18" height="8" rx="1.5" fill={C.ink}/></svg>
      </div>
    </div>
  );
}

// ── Engagement Card ──────────────────────────────────────────
function EngagementCard({ t }) {
  const items = [
    { label:'Purpose', text:'Great timing — this is when environment habits either stick or slide.' },
    { label:'Outcome', text:'Sessions that flow, because the setup did the work.' },
  ];
  return (
    <div style={{
      position:'absolute', top:44, left:0, right:0,
      padding:'16px 14px',
      background:C.cream,
      minHeight:'calc(100% - 44px)',
      overflow:'hidden',
    }}>
      {/* Header area */}
      <div style={{
        display:'flex',alignItems:'center',gap:8,
        marginBottom:14,
        opacity: easeOut(Math.min(1,(t)/0.4)),
        transform:`translateY(${lerp(12,0,easeOut(Math.min(1,t/0.4)))}px)`,
      }}>
        <LogoGlyph size={24}/>
        <div>
          <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:C.orange}}>Week 1 · Module</div>
          <div style={{fontFamily:'Inter,sans-serif',fontSize:11,color:C.inkFade}}>Right on time</div>
        </div>
      </div>

      {/* Hook — pregnancy-app style check-in */}
      <div style={{
        background:'white',
        borderRadius:16,
        padding:'14px 16px',
        marginBottom:12,
        boxShadow:'0 2px 12px rgba(42,24,16,0.06)',
        opacity: easeOut(Math.min(1,(t-0.2)/0.5)),
        transform:`translateY(${lerp(16,0,easeOut(Math.min(1,(t-0.2)/0.5)))}px)`,
      }}>
        <div style={{fontFamily:'Fraunces,Georgia,serif',fontStyle:'italic',fontSize:17,color:C.ink,lineHeight:1.3,marginBottom:6}}>
          "A week in — are your sessions starting to feel like yours?"
        </div>
        <div style={{fontFamily:'Inter,sans-serif',fontSize:12.5,color:C.inkFade,lineHeight:1.5}}>
          This is when how you set up the environment starts to matter more than anything you plan to teach.
        </div>
      </div>

      {/* Topic */}
      <div style={{
        marginBottom:10,
        opacity: easeOut(Math.min(1,(t-0.45)/0.45)),
        transform:`translateY(${lerp(14,0,easeOut(Math.min(1,(t-0.45)/0.45)))}px)`,
      }}>
        <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:C.inkFade,marginBottom:4}}>This module</div>
        <div style={{fontFamily:'Inter,sans-serif',fontSize:15,fontWeight:600,color:C.ink}}>Staging Engaging Learning Opportunities</div>
      </div>

      {/* Bullet points */}
      {items.map((item, i) => {
        const p = easeOut(Math.min(1,(t-(0.65+i*0.2))/0.4));
        return (
          <div key={i} style={{
            display:'flex',gap:10,alignItems:'flex-start',
            marginBottom:8,
            opacity:p,
            transform:`translateY(${lerp(12,0,p)}px)`,
          }}>
            <div style={{
              width:6,height:6,borderRadius:3,
              background:C.orange,
              marginTop:6,flexShrink:0,
            }}/>
            <div>
              <div style={{fontFamily:'Inter,sans-serif',fontSize:11,fontWeight:600,color:C.orange,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:1}}>{item.label}</div>
              <div style={{fontFamily:'Inter,sans-serif',fontSize:12.5,color:C.inkFade,lineHeight:1.45}}>{item.text}</div>
            </div>
          </div>
        );
      })}

      {/* CTA button */}
      <div style={{
        marginTop:16,
        opacity: easeOut(Math.min(1,(t-1.1)/0.5)),
        transform:`translateY(${lerp(10,0,easeOut(Math.min(1,(t-1.1)/0.5)))}px)`,
      }}>
        <div style={{
          background:C.orange,
          borderRadius:99,
          padding:'13px 20px',
          display:'flex',alignItems:'center',justifyContent:'space-between',
        }}>
          <span style={{fontFamily:'Inter,sans-serif',fontSize:14,fontWeight:600,color:'white'}}>Begin module</span>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:11,color:'rgba(255,255,255,0.75)'}}>6 min</span>
            <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="rgba(255,255,255,0.2)"/><path d="M6 5l4 3-4 3V5z" fill="white"/></svg>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Module Player ────────────────────────────────────────────
function ModulePlayer({ t }) {
  const progress = Math.min(1, t / 2.5);
  return (
    <div style={{
      position:'absolute', top:44, left:0, right:0,
      padding:'20px 16px',
      background:'#1A100B',
      minHeight:'calc(100% - 44px)',
    }}>
      {/* Back */}
      <div style={{color:C.orange,fontFamily:'Inter,sans-serif',fontSize:13,marginBottom:20,opacity:0.8}}>← Back</div>

      {/* Thumbnail placeholder */}
      <div style={{
        borderRadius:16,height:160,
        background:`linear-gradient(135deg, ${C.orange}22, ${C.orangeDeep}44)`,
        border:`1px solid ${C.orange}33`,
        display:'flex',alignItems:'center',justifyContent:'center',
        marginBottom:18,
        position:'relative',overflow:'hidden',
      }}>
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:'Fraunces,serif',fontSize:22,color:C.cream,fontStyle:'italic',marginBottom:4}}>Staging Learning</div>
          <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:11,color:C.orange,letterSpacing:'0.1em'}}>MICROMODULE · 6 MIN</div>
        </div>
        {/* Shimmer */}
        <div style={{
          position:'absolute',top:0,left:`${-100+progress*300}%`,width:'60%',height:'100%',
          background:'linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent)',
          transform:'skewX(-15deg)',
          pointerEvents:'none',
        }}/>
      </div>

      {/* Progress */}
      <div style={{marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:11,color:C.orange}}>
            {Math.floor(progress*6)}:{String(Math.floor((progress*6*60)%60)).padStart(2,'0')}
          </span>
          <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:11,color:'rgba(250,245,239,0.4)'}}>6:00</span>
        </div>
        <div style={{height:4,background:'rgba(250,245,239,0.1)',borderRadius:2}}>
          <div style={{height:'100%',width:`${progress*100}%`,background:C.orange,borderRadius:2,transition:'width 0.1s'}}/>
        </div>
      </div>

      {/* Now playing */}
      <div style={{fontFamily:'Inter,sans-serif',fontSize:13,color:'rgba(250,245,239,0.55)',lineHeight:1.5,marginTop:14}}>
        Now playing: <span style={{color:C.cream,fontWeight:500}}>Staging Engaging Learning Opportunities</span>
      </div>
    </div>
  );
}

// ── Checklist ─────────────────────────────────────────────────
function ChecklistView({ t }) {
  const items = [
    'Identify 2–3 preferred items before you start',
    'Arrange your space: motivation within reach, distractions out',
    'Check in with your client before the first trial',
  ];
  return (
    <div style={{
      position:'absolute',top:44,left:0,right:0,
      padding:'18px 14px',
      background:C.cream,
      minHeight:'calc(100% - 44px)',
    }}>
      <div style={{
        opacity:easeOut(Math.min(1,t/0.4)),
        transform:`translateY(${lerp(10,0,easeOut(Math.min(1,t/0.4)))}px)`,
      }}>
        <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:C.orange,marginBottom:4}}>Before your next session</div>
        <div style={{fontFamily:'Fraunces,serif',fontSize:22,fontWeight:300,color:C.ink,lineHeight:1.2,marginBottom:18}}>Your session prep checklist</div>
      </div>
      {items.map((item,i) => {
        const delay = 0.3+i*0.35;
        const p = easeOut(Math.min(1,(t-delay)/0.5));
        const checked = t > delay+0.8;
        return (
          <div key={i} style={{
            display:'flex',gap:12,alignItems:'flex-start',
            marginBottom:16,opacity:p,
            transform:`translateX(${lerp(-16,0,p)}px)`,
          }}>
            <div style={{
              width:22,height:22,borderRadius:6,
              border:`2px solid ${checked?C.green:C.ink}`,
              background:checked?C.green:'transparent',
              display:'flex',alignItems:'center',justifyContent:'center',
              flexShrink:0, marginTop:1,
              transition:'all 0.3s',
            }}>
              {checked && <svg width="12" height="9" viewBox="0 0 12 9"><path d="M1 4.5L4.5 8 11 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>
            <div style={{fontFamily:'Inter,sans-serif',fontSize:14,color:checked?C.inkFade:C.ink,lineHeight:1.45,transition:'color 0.3s',textDecoration:checked?'line-through':'none'}}>{item}</div>
          </div>
        );
      })}
      {t > 1.8 && (
        <div style={{
          marginTop:20,padding:'12px 14px',borderRadius:12,
          background:`${C.green}14`,border:`1px solid ${C.green}44`,
          opacity:easeOut(Math.min(1,(t-1.8)/0.5)),
        }}>
          <div style={{fontFamily:'Inter,sans-serif',fontSize:13,color:C.green,fontWeight:500}}>✓ Saved to your toolkit</div>
          <div style={{fontFamily:'Inter,sans-serif',fontSize:12,color:C.inkFade,marginTop:2}}>Reference this any time from your library</div>
        </div>
      )}
    </div>
  );
}

// ── Arc / Journey view ────────────────────────────────────────
function ArcView({ t, W, H }) {
  const milestones = [
    { label:'Day 0', sub:'Onboarding 101', week:'W·01', x:0.06 },
    { label:'Week 1', sub:'Staging Opportunities', week:'W·02', x:0.22 },
    { label:'Week 2', sub:'Data Collection', week:'W·03', x:0.38 },
    { label:'Month 1', sub:'Progress Check', week:'W·06', x:0.54 },
    { label:'Month 3', sub:'Plan Review', week:'W·12', x:0.72 },
    { label:'Month 6', sub:'Supervisee Prep', week:'W·26', x:0.88 },
  ];

  const arcY = H*0.52;
  const arcH = H*0.14; // arc depth

  // Path: gentle S-curve across the screen
  const pathD = `M ${W*0.04} ${arcY+arcH*0.3}
    C ${W*0.2} ${arcY+arcH*0.5} ${W*0.35} ${arcY-arcH*0.8} ${W*0.52} ${arcY-arcH*0.2}
    S ${W*0.75} ${arcY+arcH*0.7} ${W*0.96} ${arcY-arcH*0.1}`;

  // compute y on the arc at each milestone x
  function arcYAt(xFrac) {
    // cubic bezier approx
    const x = xFrac;
    return arcY + arcH*0.3 - x * arcH*0.5 + Math.sin(x*Math.PI*1.6)*arcH*0.7;
  }

  return (
    <div style={{position:'absolute',inset:0,background:`linear-gradient(160deg, #0D0806 0%, #1A100B 60%, #251508 100%)`,overflow:'hidden'}}>

      {/* Ambient grid */}
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:0.08}}>
        <defs>
          <pattern id="arcgrid" width="60" height="60" patternUnits="userSpaceOnUse">
            <line x1="60" y1="0" x2="0" y2="60" stroke={C.orange} strokeWidth="0.5" opacity="0.4"/>
            <line x1="0" y1="0" x2="60" y2="60" stroke={C.orange} strokeWidth="0.5" opacity="0.4"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#arcgrid)"/>
      </svg>

      {/* Header area — positioned to the right of the phone when in arc view */}
      <div style={{
        position:'absolute',top:40,left:W*0.31,
        opacity:easeOut(Math.min(1,t/0.6)),
        transform:`translateY(${lerp(16,0,easeOut(Math.min(1,t/0.6)))}px)`,
        maxWidth:480,
      }}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
          <LogoGlyph size={32}/>
          <div>
            <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:11,letterSpacing:'0.16em',textTransform:'uppercase',color:C.orange}}>Provider Roadmap · RBT</div>
          </div>
        </div>
        <div style={{fontFamily:'Fraunces,serif',fontSize:H*0.055,fontWeight:300,color:C.cream,lineHeight:1.1,maxWidth:500}}>
          Every opportunity,<br/><em style={{fontStyle:'italic',color:C.orange}}>mapped to the moment.</em>
        </div>
      </div>

      {/* Arc path */}
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',overflow:'visible'}}>
        <defs>
          <linearGradient id="arcgrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stopColor={C.orange} stopOpacity="0.2"/>
            <stop offset="35%" stopColor={C.orange} stopOpacity="0.8"/>
            <stop offset="100%" stopColor={C.orange} stopOpacity="0.3"/>
          </linearGradient>
        </defs>
        {/* dotted baseline */}
        <line x1={W*0.04} y1={H*0.65} x2={W*0.96} y2={H*0.65}
          stroke="rgba(250,245,239,0.08)" strokeWidth="1" strokeDasharray="4 8"/>
        {/* arc */}
        <path d={pathD} fill="none" stroke="url(#arcgrad)" strokeWidth="2.5"
          strokeLinecap="round"
          style={{
            strokeDasharray: 2000,
            strokeDashoffset: lerp(2000, 0, easeOut(Math.min(1, (t-0.3)/1.8))),
          }}/>
      </svg>

      {/* Milestones */}
      {milestones.map((m, i) => {
        const delay = 0.5 + i * 0.22;
        const p = easeBack(Math.min(1, Math.max(0, (t - delay) / 0.4)));
        const mx = W * m.x;
        const my = arcYAt(m.x);
        const isActive = i === 1; // Week 1 = highlighted
        return (
          <div key={i} style={{
            position:'absolute',
            left: mx,
            top: my,
            transform:`translate(-50%,-50%) scale(${p})`,
            opacity: p,
          }}>
            {/* Label above */}
            <div style={{
              position:'absolute',
              bottom: isActive ? 38 : 32,
              left:'50%',
              transform:'translateX(-50%)',
              whiteSpace:'nowrap',
              textAlign:'center',
            }}>
              <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:10,color:isActive?C.orange:'rgba(250,245,239,0.4)',letterSpacing:'0.12em'}}>{m.week}</div>
              <div style={{fontFamily:'Inter,sans-serif',fontSize:12,color:isActive?C.cream:'rgba(250,245,239,0.5)',fontWeight:isActive?600:400}}>{m.label}</div>
              {isActive && <div style={{fontFamily:'Inter,sans-serif',fontSize:11,color:C.orange,marginTop:1}}>{m.sub}</div>}
            </div>
            {/* Dot */}
            <div style={{
              width: isActive ? 20 : 12,
              height: isActive ? 20 : 12,
              borderRadius:'50%',
              background: isActive ? C.orange : 'rgba(250,245,239,0.25)',
              border: `2px solid ${isActive ? C.orange : 'rgba(250,245,239,0.2)'}`,
              boxShadow: isActive ? `0 0 20px ${C.orange}88, 0 0 40px ${C.orange}44` : 'none',
              marginLeft: isActive ? -10 : -6,
              marginTop: isActive ? -10 : -6,
            }}/>
            {/* Active ring pulse */}
            {isActive && (
              <div style={{
                position:'absolute',
                width:36,height:36,
                borderRadius:'50%',
                border:`1.5px solid ${C.orange}`,
                top:-18, left:-18,
                opacity: 0.4 + 0.3*Math.sin(t*4),
              }}/>
            )}
          </div>
        );
      })}

      {/* Active milestone callout card */}
      {t > 1.2 && (
        <div style={{
          position:'absolute',
          right:60,
          bottom: H*0.22,
          width:280,
          background:'rgba(250,245,239,0.05)',
          border:`1px solid ${C.orange}33`,
          borderRadius:16,
          padding:20,
          backdropFilter:'blur(12px)',
          opacity:easeOut(Math.min(1,(t-1.2)/0.5)),
          transform:`translateY(${lerp(16,0,easeOut(Math.min(1,(t-1.2)/0.5)))}px)`,
        }}>
          <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:10,color:C.orange,letterSpacing:'0.14em',textTransform:'uppercase',marginBottom:6}}>Just delivered · W·02</div>
          <div style={{fontFamily:'Fraunces,serif',fontSize:17,color:C.cream,fontWeight:300,lineHeight:1.25,marginBottom:10}}>Staging Engaging Learning Opportunities</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {['6 min','Checklist included','RBT · Week 1'].map(tag => (
              <span key={tag} style={{
                fontFamily:'JetBrains Mono,monospace',fontSize:10,
                padding:'3px 8px',borderRadius:99,
                background:`${C.orange}18`,color:C.orangeGlow,
                letterSpacing:'0.06em',
              }}>{tag}</span>
            ))}
          </div>
        </div>
      )}

      {/* Bottom label */}
      <div style={{
        position:'absolute',bottom:30,left:60,right:60,
        display:'flex',justifyContent:'space-between',alignItems:'center',
        opacity:easeOut(Math.min(1,(t-1.6)/0.5)),
      }}>
        <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:10,color:'rgba(250,245,239,0.3)',letterSpacing:'0.14em',textTransform:'uppercase'}}>
          Behavioral health provider journey · Year 1
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <LogoGlyph size={18}/>
          <span style={{fontFamily:'Fraunces,serif',fontSize:16,color:'rgba(250,245,239,0.5)',fontStyle:'italic'}}>aetho<span style={{color:C.orange}}>flo</span></span>
        </div>
      </div>
    </div>
  );
}

// ── Scene controller ──────────────────────────────────────────
// Scene   Start  End     What
// 0       0      2.5     SMS arrives
// 1       2.5    7.5     Card expands (card t = time-2.5)
// 2       7.5    11      Module playing (t=time-7.5)
// 3       11     15      Checklist (t=time-11)
// 4       15     24      Arc pan-out (t=time-15)
// fade    23.5   24      fade to black before loop

function Scene() {
  const { time, duration } = useTimeline();
  const W=1280, H=720;

  // Phone position: zooms out as we go to arc
  const phoneScale = animate({from:1,to:0.46,start:14.5,end:15.5,ease:easeOut})(time);
  const phoneX = animate({from:W/2-160,to:W*0.13,start:14.5,end:15.5,ease:easeOut})(time);
  const phoneY = animate({from:H/2-310,to:H*0.14,start:14.5,end:15.5,ease:easeOut})(time);
  const phoneOpacity = animate({from:1,to:0,start:17,end:17.8,ease:ease})(time);

  // Scene times
  const inSMS     = time < 2.5;
  const inCard    = time >= 2.5 && time < 7.5;
  const inModule  = time >= 7.5 && time < 11;
  const inChecklist = time >= 11 && time < 15;
  const inArc     = time >= 14.5;

  // Global fade overlay
  const fadeOverlay = time > 23.5 ? easeOut((time-23.5)/0.5) : 0;

  return (
    <div style={{width:W,height:H,position:'relative',overflow:'hidden',background:'#0D0806'}}>

      {/* Ambient bg for early scenes */}
      {!inArc && (
        <div style={{
          position:'absolute',inset:0,
          background:'radial-gradient(ellipse 60% 50% at 50% 50%, rgba(232,122,78,0.06), transparent 70%)',
        }}/>
      )}

      {/* Arc behind phone */}
      {inArc && <ArcView t={time-14.5} W={W} H={H}/>}

      {/* Phone */}
      <div style={{
        position:'absolute',
        left:phoneX, top:phoneY,
        transition: time < 14.5 ? 'none' : 'none',
        opacity: phoneOpacity,
      }}>
        <Phone x={0} y={0} scale={phoneScale}>
          <StatusBar/>
          {/* Scenes within phone */}
          {inSMS && (
            <div style={{position:'absolute',inset:0,background:C.cream}}>
              <SMSBubble
                opacity={easeOut(Math.min(1,time/0.4))}
                ty={lerp(-40,0,easeOut(Math.min(1,time/0.4)))}
              />
              {/* Hint text */}
              {time > 1.2 && (
                <div style={{
                  position:'absolute',bottom:30,left:0,right:0,textAlign:'center',
                  fontFamily:'Inter,sans-serif',fontSize:12,color:C.inkFade,
                  opacity:easeOut(Math.min(1,(time-1.2)/0.4)),
                }}>tap to open →</div>
              )}
            </div>
          )}
          {inCard && <EngagementCard t={time-2.5}/>}
          {inModule && <ModulePlayer t={time-7.5}/>}
          {inChecklist && <ChecklistView t={time-11}/>}
          {/* Phone fades when zooming out */}
          {inArc && time < 15.5 && (
            inChecklist
              ? <ChecklistView t={time-11}/>
              : <div style={{position:'absolute',inset:0,background:C.cream}}/>
          )}
        </Phone>
      </div>

      {/* Scene label in top-left (for context) */}
      {!inArc && (
        <div style={{
          position:'absolute',bottom:28,left:36,
          display:'flex',alignItems:'center',gap:10,
          opacity:0.5,
        }}>
          <LogoGlyph size={20}/>
          <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:11,color:C.cream,letterSpacing:'0.12em',textTransform:'uppercase'}}>
            {inSMS?'01 · The notification arrives':inCard?'02 · The moment card':inModule?'03 · Module · 6 min':'04 · Session prep checklist'}
          </span>
        </div>
      )}

      {/* Fade overlay */}
      {fadeOverlay > 0 && (
        <div style={{position:'absolute',inset:0,background:'#0D0806',opacity:fadeOverlay,pointerEvents:'none'}}/>
      )}
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────────
function App() {
  return (
    <Stage width={1280} height={720} duration={34} background="#0D0806" persistKey="aethoflo-anim" loop={true} autoplay={true}>
      <Scene/>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
